# =============================================================================
# AI Code Review - GitLab CI Template
# =============================================================================
# Include this template in your .gitlab-ci.yml:
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/KonstZiv/ai-code-reviewer/main/examples/gitlab-ci.yml'
#
# Or copy the job definition to your .gitlab-ci.yml
#
# Required CI/CD variables:
#   - GOOGLE_API_KEY: Your Google API key for Gemini (masked, protected)
#
# The CI_JOB_TOKEN is automatically provided by GitLab CI.
#
# Migration note: Environment variables now use the AI_REVIEWER_ prefix.
# Old names (e.g. GOOGLE_API_KEY) still work as fallback.
# =============================================================================

# AI Code Review job
ai-review:
  stage: test
  image: ghcr.io/konstziv/ai-code-reviewer:1

  # Only run on merge requests
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

  variables:
    # GitLab token (automatically provided)
    AI_REVIEWER_GITLAB_TOKEN: $CI_JOB_TOKEN
    # Google API key (set in CI/CD settings)
    AI_REVIEWER_GOOGLE_API_KEY: $GOOGLE_API_KEY
    # Optional: customize settings
    # AI_REVIEWER_LANGUAGE: "en"
    # AI_REVIEWER_LANGUAGE_MODE: "adaptive"
    # AI_REVIEWER_GEMINI_MODEL: "gemini-2.5-flash"
    # AI_REVIEWER_LOG_LEVEL: "INFO"
    # AI_REVIEWER_REVIEW_MAX_COMMENT_CHARS: "3000"
    # AI_REVIEWER_REVIEW_INCLUDE_BOT_COMMENTS: "true"
    # AI_REVIEWER_REVIEW_POST_INLINE_COMMENTS: "true"

  script:
    - ai-review

  # Allow failure so it doesn't block the pipeline
  allow_failure: true

  # Cache nothing - stateless
  cache: []

# =============================================================================
# Alternative: Using your own GitLab token with more permissions
# =============================================================================
# If CI_JOB_TOKEN doesn't have enough permissions, use a Personal Access Token:
# 1. Go to User Settings > Access Tokens > Add new token
# 2. Create token with 'api' scope
# 3. Add as CI/CD variable: GITLAB_API_TOKEN (masked, protected)
#
# Note: Project Access Tokens require GitLab Premium/Ultimate plan.
# Personal Access Tokens work on all plans including Free.
#
# Then use this configuration:
#
# ai-review:
#   stage: test
#   image: ghcr.io/konstziv/ai-code-reviewer:1
#   rules:
#     - if: $CI_PIPELINE_SOURCE == "merge_request_event"
#   variables:
#     AI_REVIEWER_GITLAB_TOKEN: $GITLAB_API_TOKEN
#     AI_REVIEWER_GOOGLE_API_KEY: $GOOGLE_API_KEY
#   script:
#     - ai-review
#   allow_failure: true
