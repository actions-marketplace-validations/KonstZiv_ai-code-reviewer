# Small Team Configuration ($10-30/month)
# For: Small teams (2-10 developers), startups
# Cost: ~$10-30/month (hybrid approach)
# Features: Multiple agents, intelligent routing

llm:
  # Use hybrid approach: cheap for simple, quality for complex
  providers:
    - anthropic  # Primary: best quality
    - google     # Fallback: cheap
  
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    models:
      simple: claude-3-5-haiku-20241022      # $0.80/1M in
      medium: claude-3-5-haiku-20241022      # $0.80/1M in
      complex: claude-3-5-sonnet-20241022    # $3/1M in
    max_tokens: 4096
    timeout: 60
  
  google:
    api_key: ${GOOGLE_API_KEY}
    models:
      simple: gemini-1.5-flash     # Fallback
      medium: gemini-1.5-flash
      complex: gemini-1.5-pro
    max_tokens: 4096
    timeout: 60
  
  # Balanced cost/quality
  track_costs: true
  cost_budget_per_review: 0.15  # ~$15-30/month for 100-200 reviews
  strategy: balanced

review:
  # Standard analysis
  analysis_depth: normal
  
  # Core agents
  enabled_agents:
    - security
    - architecture
    - qa
  
  # Approval settings
  can_auto_approve: true
  min_confidence_for_approval: 0.85
  max_findings_before_reject: 10
  critical_severity_auto_reject: true
  
  # Block for critical paths
  require_human_for:
    - has_database_migration
    - touches_auth_module

context:
  # Full context
  storage: artifacts
  max_size_kb: 50
  enable_learning: true

logging:
  level: INFO
  format: json
  
metrics:
  backend: none  # Can add Prometheus later
