name: 'AI ReviewBot'
description: 'AI-powered code review for pull requests with inline suggestions'
author: 'Kostyantin Zivenko'

branding:
  icon: 'code'
  color: 'blue'

inputs:
  github_token:
    description: 'GitHub token for API access (usually secrets.GITHUB_TOKEN)'
    required: true
  google_api_key:
    description: 'Google API key for Gemini (comma-separated for multi-key rotation)'
    required: true
  language:
    description: 'Response language (ISO 639 code, e.g., en, uk, de)'
    required: false
    default: 'en'
  language_mode:
    description: 'Language mode: adaptive (detect from PR) or fixed'
    required: false
    default: 'adaptive'
  gemini_model:
    description: 'Gemini model to use'
    required: false
    default: 'gemini-2.5-flash'
  gemini_model_fallback:
    description: 'Fallback model when primary is unavailable (empty to disable)'
    required: false
    default: 'gemini-3-flash-preview'
  log_level:
    description: 'Log level (DEBUG, INFO, WARNING, ERROR)'
    required: false
    default: 'INFO'
  review_max_comment_chars:
    description: 'Max MR comment chars in AI prompt (0 to disable)'
    required: false
    default: '3000'
  review_include_bot_comments:
    description: 'Include bot comments in AI prompt'
    required: false
    default: 'true'
  review_post_inline_comments:
    description: 'Post inline comments on specific lines (true/false)'
    required: false
    default: 'true'
  review_enable_dialogue:
    description: 'Group comments into threaded dialogues in AI prompt'
    required: false
    default: 'true'
  discovery_enabled:
    description: 'Enable project discovery before review'
    required: false
    default: 'true'
  discovery_verbose:
    description: 'Always post discovery comment (default: only on gaps)'
    required: false
    default: 'false'
  discovery_timeout:
    description: 'Discovery pipeline timeout in seconds (1-300)'
    required: false
    default: '30'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/konstziv/ai-code-reviewer:1'
  args: []  # Override CMD to run ai-review without --help
  env:
    AI_REVIEWER_GITHUB_TOKEN: ${{ inputs.github_token }}
    AI_REVIEWER_GOOGLE_API_KEY: ${{ inputs.google_api_key }}
    AI_REVIEWER_LANGUAGE: ${{ inputs.language }}
    AI_REVIEWER_LANGUAGE_MODE: ${{ inputs.language_mode }}
    AI_REVIEWER_GEMINI_MODEL: ${{ inputs.gemini_model }}
    AI_REVIEWER_LOG_LEVEL: ${{ inputs.log_level }}
    AI_REVIEWER_REVIEW_MAX_COMMENT_CHARS: ${{ inputs.review_max_comment_chars }}
    AI_REVIEWER_REVIEW_INCLUDE_BOT_COMMENTS: ${{ inputs.review_include_bot_comments }}
    AI_REVIEWER_REVIEW_POST_INLINE_COMMENTS: ${{ inputs.review_post_inline_comments }}
    AI_REVIEWER_REVIEW_ENABLE_DIALOGUE: ${{ inputs.review_enable_dialogue }}
    AI_REVIEWER_DISCOVERY_ENABLED: ${{ inputs.discovery_enabled }}
    AI_REVIEWER_DISCOVERY_VERBOSE: ${{ inputs.discovery_verbose }}
    AI_REVIEWER_DISCOVERY_TIMEOUT: ${{ inputs.discovery_timeout }}
    AI_REVIEWER_GEMINI_MODEL_FALLBACK: ${{ inputs.gemini_model_fallback }}
    GITHUB_ACTIONS: 'true'
