name: Node CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx eslint src/
      - run: npx prettier --check .
      - run: npx tsc --noEmit
      - run: npx jest --coverage --coverageThreshold='{"global":{"branches":75}}'
      - run: npm audit --audit-level=high
